<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenLens Credit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a1f14;
      color: #ecfdf5;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #064e3b, #047857);
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #10b981;
    }

    .logo { font-size: 22px; }

    .brand h1 {
      font-size: 15px;
      font-weight: 800;
      color: #d1fae5;
      letter-spacing: 0.04em;
    }

    .brand p {
      font-size: 10px;
      color: #6ee7b7;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Score section ── */
    .score-section {
      padding: 20px 16px 12px;
      text-align: center;
    }

    .score-ring {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 10px;
    }

    .score-ring svg {
      transform: rotate(-90deg);
    }

    .score-ring .bg-circle {
      fill: none;
      stroke: #1f4d34;
      stroke-width: 8;
    }

    .score-ring .fg-circle {
      fill: none;
      stroke: #10b981;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .score-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-num {
      font-size: 32px;
      font-weight: 900;
      color: #6ee7b7;
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      color: #34d399;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score-title {
      font-size: 11px;
      color: #6ee7b7;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 1px;
      margin: 0 16px 14px;
      background: #1f4d34;
      border-radius: 10px;
      overflow: hidden;
    }

    .stat {
      flex: 1;
      background: #0d2e1e;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-val {
      font-size: 18px;
      font-weight: 800;
      color: #34d399;
    }

    .stat-lbl {
      font-size: 9px;
      color: #6ee7b7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* ── Loan offer ── */
    .loan-section {
      margin: 0 16px 14px;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6ee7b7;
      margin-bottom: 8px;
    }

    .loan-card {
      background: #0d2e1e;
      border: 1px solid #1f4d34;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .loan-bank {
      font-size: 12px;
      font-weight: 700;
      color: #d1fae5;
    }

    .loan-type {
      font-size: 10px;
      color: #6ee7b7;
      margin-top: 1px;
    }

    .loan-rate {
      text-align: right;
    }

    .rate-old {
      font-size: 10px;
      color: #6b7280;
      text-decoration: line-through;
    }

    .rate-new {
      font-size: 14px;
      font-weight: 800;
      color: #34d399;
    }

    /* ── Activity feed ── */
    .activity-section {
      margin: 0 16px 14px;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #1f4d34;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-icon { font-size: 14px; }

    .activity-text {
      flex: 1;
      font-size: 11px;
      color: #a7f3d0;
      line-height: 1.3;
    }

    .activity-credits {
      font-size: 11px;
      font-weight: 700;
      color: #34d399;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #4b7a61;
      font-size: 12px;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1f4d34;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-status {
      font-size: 10px;
      color: #34d399;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .reset-btn {
      background: none;
      border: 1px solid #1f4d34;
      color: #4b7a61;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .reset-btn:hover {
      color: #ef4444;
      border-color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">🌿</div>
    <div class="brand">
      <h1>GreenLens Credit</h1>
      <p>Sustainable Score System</p>
    </div>
  </div>

  <!-- Score Ring -->
  <div class="score-section">
    <div class="score-title">Green Credit Score</div>
    <div class="score-ring">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="bg-circle" cx="55" cy="55" r="45"/>
        <circle class="fg-circle" id="score-arc" cx="55" cy="55" r="45"/>
      </svg>
      <div class="score-inner">
        <div class="score-num" id="score-display">0</div>
        <div class="score-label">/ 100</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="credits-display">0</div>
      <div class="stat-lbl">GreenCredits</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="co2-display">0 kg</div>
      <div class="stat-lbl">CO₂ Saved</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="switches-display">0</div>
      <div class="stat-lbl">Switches</div>
    </div>
  </div>

  <!-- Loan Offers -->
  <div class="loan-section">
    <div class="section-title">🏦 Your Loan Offers</div>
    <div id="loan-offers">
      <div class="loan-card">
        <div>
          <div class="loan-bank">HDFC Bank</div>
          <div class="loan-type">Personal Loan</div>
        </div>
        <div class="loan-rate">
          <div class="rate-old">11.5%</div>
          <div class="rate-new" id="hdfc-rate">11.5%</div>
        </div>
      </div>
      <div class="loan-card">
        <div>
          <div class="loan-bank">SBI</div>
          <div class="loan-type">Home Loan</div>
        </div>
        <div class="loan-rate">
          <div class="rate-old">8.5%</div>
          <div class="rate-new" id="sbi-rate">8.5%</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Activity -->
  <div class="activity-section">
    <div class="section-title">⚡ Recent Switches</div>
    <div id="activity-list">
      <div class="empty-state">No switches yet.<br/>Start shopping to earn credits!</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-status">
      <div class="status-dot"></div>
      Active on Amazon & Flipkart
    </div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
